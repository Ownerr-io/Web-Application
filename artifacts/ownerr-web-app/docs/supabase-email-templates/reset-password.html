<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
</head>
<body style="margin:0;padding:0;background-color:#0b0b0c;font-family:Arial,Helvetica,sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color:#0b0b0c;padding:32px 16px;">
    <tr>
      <td align="center">
        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background-color:#121315;border:1px solid #2a2e35;border-radius:8px;padding:32px 28px;">
          <tr>
            <td align="center" style="padding-bottom:20px;">
              <img src="https://ownerr.live/opengraph.jpg" alt="Ownerr" width="120" height="63" style="display:block;border:0;border-radius:6px;" />
            </td>
          </tr>
          <tr>
            <td style="padding-bottom:8px;">
              <h2 style="margin:0;font-size:20px;font-weight:600;color:#f4f4f5;text-align:center;">Reset your password</h2>
            </td>
          </tr>
          <tr>
            <td style="padding-bottom:24px;">
              <p style="margin:0;font-size:15px;line-height:1.5;color:#9aa3af;text-align:center;">We received a request to reset your password. Follow the link below to choose a new one.</p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:24px;">
              <a href="{{ .ConfirmationURL }}" style="display:inline-block;background-color:#d9f69d;color:#0b0b0c;font-size:14px;font-weight:600;text-decoration:none;padding:12px 24px;border-radius:6px;">Reset password</a>
            </td>
          </tr>
          <tr>
            <td style="padding-bottom:8px;">
              <p style="margin:0;font-size:13px;line-height:1.5;color:#9aa3af;text-align:center;">If you didn't request this, you can safely ignore this email.</p>
            </td>
          </tr>
          <tr>
            <td style="border-top:1px solid #2a2e35;padding-top:20px;">
              <p style="margin:0 0 6px;font-size:13px;color:#f4f4f5;">Ownerr Intelligence</p>
              <p style="margin:0;font-size:12px;color:#9aa3af;">
                <a href="mailto:Intelligence@ownerr.live" style="color:#fdbd59;text-decoration:none;">Intelligence@ownerr.live</a>
                · <a href="https://ownerr.live" style="color:#9aa3af;text-decoration:none;">ownerr.live</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
