kind = "web"
previewPath = "/"
title = "TrustMRR"
version = "1.0.0"
id = "artifacts/trustmrr-clone"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18754

[services.development]
run = "pnpm --filter @workspace/trustmrr-clone run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/trustmrr-clone", "run", "build" ]
publicDir = "artifacts/trustmrr-clone/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18754"
BASE_PATH = "/"
